<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Preview</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <div class="card shadow p-4">
        <h2>ID Card Preview</h2>

        <div class="border rounded p-4">
          <h3 th:text="${profile.fullName}"></h3>

          <p>
            <strong>Registration:</strong>
            <span th:text="${profile.registrationNumber}"></span>
          </p>

          <p>
            <strong>Email:</strong>
            <span th:text="${profile.email}"></span>
          </p>

          <p>
            <strong>Phone:</strong>
            <span th:text="${profile.phone}"></span>
          </p>

          <p>
            <strong>Type:</strong>
            <span th:text="${profile.profileType}"></span>
          </p>

          <p>
            <strong>Department:</strong>
            <span th:text="${profile.department.name}"></span>
          </p>
        </div>

        <div class="mt-4">
          <a
            th:href="@{/profiles/{id}/pdf(id=${profile.id})}"
            class="btn btn-success"
          >
            Export PDF
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
